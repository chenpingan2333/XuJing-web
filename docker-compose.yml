version: "3.8"

services:
  xujing:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xujing
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    restart: always
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s