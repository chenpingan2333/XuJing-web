# 叙境 Xujing - Nginx 反向代理配置（Uploads 独立存储版）
# ============================================================
# 变更说明：
#   1. /uploads/ alias 从 /var/www/xujing/public/uploads/ 改为 /var/data/xujing/uploads/
#   2. 新增 /uploads/ 的访问日志单独记录
#   3. 新增防盗链 referer 校验（可选启用）
#   4. 新增 X-Content-Type-Options: nosniff 防止 MIME 嗅探
# ============================================================
# ⚠️ 此文件为方案设计，尚未生效。需手动替换 /etc/nginx/conf.d/xujing.conf 后执行 nginx -t && nginx -s reload

# HTTP 自动跳转 HTTPS
server {
    listen 80;
    server_name xujing.modelbridge.top 43.138.193.173;

    # 域名访问 → 强制 HTTPS
    return 301 https://xujing.modelbridge.top$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name xujing.modelbridge.top 43.138.193.173;

    ssl_certificate /www/server/panel/vhost/cert/xujing.modelbridge.top.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/xujing.modelbridge.top.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # 日志
    access_log /var/log/nginx/xujing_access.log;
    error_log /var/log/nginx/xujing_error.log;

    # 客户端上传大小限制
    client_max_body_size 50M;

    # 静态资源缓存 - 直接提供本地文件
    location /_next/static {
        alias /usr/share/nginx/xujing-static;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # 公共静态资源（图片等，不含 uploads）
    location /public {
        alias /var/www/xujing/public;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # 根路径静态资源（如logo.png）
    location ~ ^/(logo\.png|favicon\.(ico|svg)|robots\.txt)$ {
        root /var/www/xujing/public;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # 图片资源（官方角色头像等）
    location /images/ {
        alias /var/www/xujing/public/images/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ============================================================
    # 🔒 用户上传文件 — 独立存储目录
    # ============================================================
    # 变更：alias 从 /var/www/xujing/public/uploads/ → /var/data/xujing/uploads/
    # 原因：将用户上传文件与应用 public 目录解耦，防止部署时 rsync --delete 误删
    location /uploads/ {
        alias /var/data/xujing/uploads/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        # 防止 MIME 嗅探攻击
        add_header X-Content-Type-Options "nosniff";
        # 单独记录 uploads 访问日志（便于审计）
        access_log /var/log/nginx/xujing_uploads_access.log;
    }

    # ============================================================
    # 🔒 防盗链配置（可选，取消注释启用）
    # ============================================================
    # location /uploads/ {
    #     alias /var/data/xujing/uploads/;
    #     expires 7d;
    #     add_header Cache-Control "public, max-age=604800";
    #     add_header X-Content-Type-Options "nosniff";
    #     access_log /var/log/nginx/xujing_uploads_access.log;
    #     # 仅允许本站和空 referer 访问
    #     valid_referers none blocked server_names xujing.modelbridge.top 43.138.193.173;
    #     if ($invalid_referer) {
    #         return 403;
    #     }
    # }

    # 主代理
    location / {
        proxy_pass http://[::1]:3003;
        proxy_http_version 1.1;

        # 请求头转发
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 和 WebSocket 支持
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;

        # 流式响应
        chunked_transfer_encoding on;
    }
}
